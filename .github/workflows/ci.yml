name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  lint:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: ./.github/actions/setup-pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm lint:arch
      - run: pnpm architecture-check

  typecheck:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: ./.github/actions/setup-pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  build:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: ./.github/actions/setup-pnpm
      - run: pnpm install --frozen-lockfile
      - run: SKIP_ENV_VALIDATION=true pnpm build
      - run: pnpm check:edge-bundle

  test-unit:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: ./.github/actions/setup-pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:unit
        env:
          SKIP_ENV_VALIDATION: "true"
      - uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: unit
          files: packages/**/coverage/lcov.info,apps/web/coverage/lcov.info
          fail_ci_if_error: true

  test-integration:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    env:
      SUPABASE_INTERNAL_IMAGE_REGISTRY: ghcr.io
      TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
      ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
      NEXT_PUBLIC_META_SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_META_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
      META_SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU
      SETUP_SECRET: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
      SKIP_ENV_VALIDATION: "true"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: ./.github/actions/setup-pnpm
      - uses: supabase/setup-cli@v1
        with:
          version: 2.107.0
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:start:meta
      - run: pnpm test:integration
      - uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: integration
          files: packages/**/coverage/lcov.info,apps/web/coverage/lcov.info
          fail_ci_if_error: true

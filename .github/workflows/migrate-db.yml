name: Migrate DB

# On push to main when Drizzle schema changes: generate migration SQL, bot commit, supabase db push.
# Migration SQL is not hand-written or hand-committed (lefthook prevent-migration-commits).
# Optional secrets: DATABASE_URL (remote apply), APP_ID + PRIVATE_KEY (GitHub App bot commits).
# Without GitHub App secrets, falls back to GITHUB_TOKEN.

on:
  push:
    branches: [main]
    paths:
      - "packages/shared/db/src/schema/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate-and-push:
    name: Generate migrations and push
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - name: Detect GitHub App credentials
        id: app-config
        run: |
          if [ -n "${{ secrets.APP_ID }}" ] && [ -n "${{ secrets.PRIVATE_KEY }}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "GitHub App secrets not configured; using GITHUB_TOKEN."
          fi

      - name: Generate GitHub App Token
        id: app-token
        if: steps.app-config.outputs.available == 'true'
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token || github.token }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version: 22.18.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Generate migrations (drizzle-kit generate)
        run: pnpm exec tsx scripts/db-generate-migration.ts

      - name: Commit generated migrations
        run: |
          if [ -n "${{ steps.app-token.outputs.app-slug }}" ]; then
            git config user.name '${{ steps.app-token.outputs.app-slug }}[bot]'
            git config user.email '${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com'
          else
            git config user.name 'github-actions[bot]'
            git config user.email 'github-actions[bot]@users.noreply.github.com'
          fi
          git add supabase/migrations
          git diff --cached --quiet || git commit -m "chore(db): run drizzle-kit generate"
          git fetch origin main
          git rebase origin/main || {
            echo "Rebase failed. Resolve conflicts manually."
            exit 1
          }
          git push origin HEAD:main

      - uses: supabase/setup-cli@v1
        if: env.DATABASE_URL != ''
        with:
          version: 2.107.0
      - name: Apply migrations (supabase db push)
        if: env.DATABASE_URL != ''
        run: supabase db push --db-url "$DATABASE_URL"

      - name: Skip remote db push (DATABASE_URL not configured)
        if: env.DATABASE_URL == ''
        run: echo "DATABASE_URL secret not configured; skipping supabase db push."

name: Migrate DB

# On push to main when Drizzle schema changes: generate migration SQL, bot commit, supabase db push.
# Migration SQL is not hand-written or hand-committed (lefthook prevent-migration-commits).
# Required secrets: DATABASE_URL, APP_ID, PRIVATE_KEY (GitHub App for bot commits).

on:
  push:
    branches: [main]
    paths:
      - "packages/shared/db/src/schema/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate-and-push:
    name: Generate migrations and push
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version: 22.18.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Generate migrations (drizzle-kit generate)
        run: pnpm --filter @supa-admin/db db:generate

      - name: Commit generated migrations
        run: |
          git config user.name '${{ steps.app-token.outputs.app-slug }}[bot]'
          git config user.email '${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com'
          git add supabase/migrations
          git diff --cached --quiet || git commit -m "chore(db): run drizzle-kit generate"
          git fetch origin main
          git rebase origin/main || {
            echo "Rebase failed. Resolve conflicts manually."
            exit 1
          }
          git push origin HEAD:main

      - uses: supabase/setup-cli@v1
        with:
          version: 2.107.0
      - name: Apply migrations (supabase db push)
        run: supabase db push --db-url "$DATABASE_URL"

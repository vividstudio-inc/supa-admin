name: Feature request
description: Suggest an idea for SupaAdmin
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the problem you want solved and how SupaAdmin could help.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What pain point does this address?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about.

  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This fits SupaAdmin's self-hosted, multi-connection Supabase admin scope
          required: true

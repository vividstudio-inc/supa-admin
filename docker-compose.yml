services:
  supa-admin:
    build: .
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - apps/web/.env.local
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

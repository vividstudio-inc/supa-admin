services:
  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    restart: unless-stopped

  supa-admin:
    build: .
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - apps/web/.env.local
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/rpc/health/ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

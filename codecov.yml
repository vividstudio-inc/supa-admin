codecov:
  notify:
    after_n_builds: 2

coverage:
  status:
    project:
      default:
        target: 80%
        threshold: 1%
    patch:
      default:
        target: 80%
        threshold: 0%
comment:
  layout: "reach,diff,flags,files"

# Mirror Vitest excludes — barrels, env bootstrap, framework glue.
# Keeps the badge aligned with in-scope business logic, not re-exports.
ignore:
  - "apps/web/lib/types/**"
  - "apps/web/lib/permissions/**"
  - "apps/web/lib/supabase/**"
  - "apps/web/lib/server/loaders/**"
  - "apps/web/lib/data-layer/**"
  - "apps/web/lib/webhooks/**"
  - "apps/web/app/api/webhooks/**"
  - "apps/web/lib/utils.ts"
  - "apps/web/lib/env.ts"
  - "apps/web/lib/orpc/router.ts"
  - "apps/web/lib/orpc/client.browser.ts"
  - "apps/web/lib/orpc/server-caller.ts"
  - "apps/web/lib/orpc/__tests__/**"
  - "apps/web/lib/shell-data.ts"
  - "apps/web/lib/connection-bootstrap.ts"
  - "apps/web/components/theme-provider.tsx"
  - "apps/web/components/theme-toggle.tsx"
  - "apps/web/components/providers/**"
  - "apps/web/components/patterns/**"
  - "apps/web/components/connections/target-setup-dialog.tsx"
  - "apps/web/components/connections/target-setup-panel.tsx"
  - "apps/web/components/connections/connection-onboarding-wizard.tsx"
  - "apps/web/components/connections/connection-table-list.tsx"
  - "packages/shared/ui/**"
  - "packages/shared/auth/src/meta-client.ts"
  - "packages/shared/auth/src/meta-server.ts"
  - "packages/shared/auth/src/server.ts"
  - "packages/shared/supabase-target/src/client.ts"
  - "packages/shared/db/src/schema/**"
  - "packages/shared/ddd/src/entity.ts"
  - "packages/shared/ddd/src/aggregate-root.ts"
  - "packages/workflows/src/internal/actor.ts"
  - "packages/workflows/src/internal/errors.ts"
  - "packages/features/*/src/index.ts"
  - "packages/workflows/src/index.ts"
  - "packages/shared/repository-kit/src/index.ts"
  - "packages/shared/utils/src/index.ts"
  - "packages/shared/errors/src/index.ts"
  - "packages/shared/crypto/src/index.ts"
